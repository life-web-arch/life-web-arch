name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests urllib3

      - name: Run Stats Generator
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ github.repository_owner }}
          CACHE_SALT: ${{ secrets.CACHE_SALT }}
        run: python generate_stats.py

      - name: Commit and Push SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add github_stats.svg repo_cache.json
          
          if git diff --staged --quiet; then
            echo "No changes in stats today. Skipping commit."
          else
            git commit -m "📊 auto-update github stats"
            git pull --rebase origin main
            git push
          fi

